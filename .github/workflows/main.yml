name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      run: |
        echo "$EC2_SSH_KEY" > key.pem
        chmod 600 key.pem
        
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_HOST << 'DEPLOY'
          echo "Starting deployment..."
          
          cd ~
          
          if [ -d "multi-language-app" ]; then
            cd multi-language-app
            git pull origin main
          else
            git clone https://github.com/${{ github.repository }}.git multi-language-app
            cd multi-language-app
          fi
          
          echo "Setting up Python server..."
          cd python-server
          python3 -m venv venv
          source venv/bin/activate
          pip3 install flask flask-cors
          pkill -f "python3 app.py" || true
          nohup python3 app.py > python.log 2>&1 &
          cd ..
          
          echo "Setting up C server..."
          cd c-server
          gcc -o c_server server.c
          pkill -f "./c_server" || true
          nohup ./c_server > c.log 2>&1 &
          cd ..
          
          echo "Setting up Frontend..."
          cd frontend
          npm install
          npm run build
          pkill -f "serve" || true
          nohup npx serve -s build -l 3000 > frontend.log 2>&1 &
          cd ..
          
          echo "Deployment completed!"
DEPLOY
